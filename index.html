<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>MCN HQ | Split Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0b0f19; font-family: 'Inter', sans-serif; color: #e2e8f0; }
    .sidebar { background: #0f172a; }
    .split-panel { background: #111827; border: 1px solid #1f2937; border-radius: 8px; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    iframe { width: 100%; height: 100%; border: none; background: white; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-white/5 p-6 flex flex-col bg-[#0b0f19]">
    <div class="mb-10 text-white font-bold text-lg tracking-widest uppercase">MCN <span class="text-amber-500">HQ</span></div>
    <nav class="space-y-6 text-xs font-semibold uppercase tracking-wider text-slate-400">
      <a href="#" class="text-white block py-2 border-l-2 border-amber-500 pl-4">Live Split Monitor</a>
      <a href="https://mcnfix.com" target="_blank" class="block py-2 hover:text-white pl-4 transition-colors">MCN Fix Portal</a>
      <a href="https://www.mcnwine.xyz" target="_blank" class="block py-2 hover:text-white pl-4 transition-colors">Wine Portal</a>
    </nav>
  </aside>

  <!-- Main Split Content -->
  <main class="flex-1 p-6 flex flex-col h-full gap-6">
    <header class="flex justify-between items-center">
      <h1 class="text-xl font-bold text-white">Live Monitoring: Side-by-Side</h1>
      <div id="clock" class="text-amber-500 font-mono text-sm">--:--</div>
    </header>

    <!-- Side-by-Side View -->
    <div class="flex-1 flex gap-6 min-h-0">
      
      <!-- Left App -->
      <div class="split-panel">
        <div class="p-2 bg-slate-900 text-[10px] text-center font-bold text-slate-400 uppercase">MCN Fix Monitoring</div>
        <iframe src="https://mcnfix.com" title="MCN Fix"></iframe>
      </div>

      <!-- Right App -->
      <div class="split-panel">
        <div class="p-2 bg-slate-900 text-[10px] text-center font-bold text-slate-400 uppercase">Wine Supply Monitoring</div>
        <iframe src="https://www.mcnwine.xyz" title="Wine Supply"></iframe>
      </div>

    </div>
  </main>

  <script>
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
