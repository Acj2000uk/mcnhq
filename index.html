<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>MCN HQ | Split Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0b0f19; font-family: 'Inter', sans-serif; color: #e2e8f0; }
    #sidebar { transition: width 0.3s ease, opacity 0.3s ease; overflow: hidden; }
    .split-panel { background: #111827; border: 1px solid #1f2937; border-radius: 8px; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    iframe { width: 100%; height: 100%; border: none; background: #0b0f19; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-white/5 flex flex-col bg-[#0b0f19]" id="sidebar">
    <div class="p-6 mb-4 text-white font-bold text-lg tracking-widest uppercase italic">MCN <span class="text-amber-500">HQ</span></div>
    <nav class="px-6 space-y-6 text-xs font-semibold uppercase tracking-wider text-slate-400">
      <a href="#" class="text-white block py-2 border-l-2 border-amber-500 pl-4">Live Split Monitor</a>
      <a href="https://mcnfix.com" target="_blank" class="block py-2 hover:text-white transition-colors">MCN Fix Portal</a>
      <a href="https://www.mcnwine.xyz" target="_blank" class="block py-2 hover:text-white transition-colors">Wine Portal</a>
    </nav>
  </aside>

  <!-- Main Split Content -->
  <main class="flex-1 p-6 flex flex-col h-full gap-6">
    <header class="flex justify-between items-center">
      <button onclick="toggleSidebar()" class="bg-slate-800 text-white px-3 py-1 rounded text-[10px] uppercase tracking-widest hover:bg-slate-700">
        ☰ Toggle Menu
      </button>
      <h1 class="text-lg font-bold text-white">Live Operations Monitor</h1>
      <div id="clock" class="text-amber-500 font-mono text-sm">--:--</div>
    </header>

    <div class="flex-1 flex gap-6 min-h-0">
      <div class="split-panel"><iframe src="https://mcnfix.com"></iframe></div>
      <div class="split-panel"><iframe src="https://www.mcnwine.xyz"></iframe></div>
    </div>
  </main>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar.style.width === '0px') {
        sidebar.style.width = '256px';
        sidebar.style.opacity = '1';
      } else {
        sidebar.style.width = '0px';
        sidebar.style.opacity = '0';
      }
    }
    
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
